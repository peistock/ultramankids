<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奥特曼大集合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 10px;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 32px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 16px;
            color: #fff;
            margin-top: 8px;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-header {
            text-align: center;
            margin: 20px 0 15px;
        }

        .category-title {
            font-size: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 15px;
            display: inline-block;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .category-title:active {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .ultraman-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 768px) {
            .ultraman-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }
        }

        .ultraman-card {
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid transparent;
        }

        .image-container {
            width: 100%;
            height: 160px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.15);
        }

        @media (min-width: 768px) {
            .image-container {
                height: 240px;
            }
        }

        .ultraman-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .placeholder-img {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .placeholder-text {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            margin-top: 5px;
        }

        .ultraman-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        @media (min-width: 768px) {
            .ultraman-name {
                font-size: 24px;
            }
        }

        .color-tag {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            padding: 3px 8px;
            background: linear-gradient(90deg, #f8f9fa, #e9ecef);
            border-radius: 10px;
            display: inline-block;
        }

        .play-btn {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 14px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
            font-family: inherit;
            -webkit-appearance: none;
            touch-action: manipulation;
            outline: none;
        }

        .play-btn.playing {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        }

        /* 各系配色 */
        .showa .image-container { background: linear-gradient(135deg, #ff6b6b, #ee5a52); }
        .showa .ultraman-name { color: #c0392b; }
        .showa { border-top: 6px solid #e74c3c; }

        .heisei .image-container { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .heisei .ultraman-name { color: #2980b9; }
        .heisei { border-top: 6px solid #3498db; }

        .newgen .image-container { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .newgen .ultraman-name { color: #8e44ad; }
        .newgen { border-top: 6px solid #9b59b6; }

        .reiwa .image-container { background: linear-gradient(135deg, #fdcb6e, #e17055); }
        .reiwa .ultraman-name { color: #e67e22; }
        .reiwa { border-top: 6px solid #f39c12; }

        .special .image-container { background: linear-gradient(135deg, #55efc4, #00b894); }
        .special .ultraman-name { color: #16a085; }
        .special { border-top: 6px solid #1abc9c; }
    </style>
</head>
<body>
    <div class="header">
        <h1>奥特曼大集合</h1>
        <p>点击播放按钮，听听奥特曼的故事吧！</p>
    </div>

    <div class="container">
        <div class="category-section">
            <div class="category-header">
                <h2 class="category-title" onclick="playCategory('showa', this)">昭和系奥特曼（经典老奥特曼）</h2>
            </div>
            <div class="ultraman-grid" id="showaGrid"></div>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2 class="category-title" onclick="playCategory('heisei', this)">平成系奥特曼（三杰时代）</h2>
            </div>
            <div class="ultraman-grid" id="heiseiGrid"></div>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2 class="category-title" onclick="playCategory('newgen', this)">新生代奥特曼（银河之后）</h2>
            </div>
            <div class="ultraman-grid" id="newgenGrid"></div>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2 class="category-title" onclick="playCategory('reiwa', this)">令和系奥特曼（最新奥特曼）</h2>
            </div>
            <div class="ultraman-grid" id="reiwaGrid"></div>
        </div>

        <div class="category-section">
            <div class="category-header">
                <h2 class="category-title" onclick="playCategory('special', this)">特殊奥特曼（传说中的战士）</h2>
            </div>
            <div class="ultraman-grid" id="specialGrid"></div>
        </div>
    </div>

    <script>
        // 奥特曼数据
        var ultramanData = {
            showa: [
                { name: "初代奥特曼", color: "红银色", emoji: "👤", image: "初代.jpg", intro: "初代奥特曼是第一个来到地球的奥特曼！他来自M78星云的光之国。绝招是斯派修姆光线！" },
                { name: "赛文奥特曼", color: "红银色", emoji: "👁️", image: "赛文.jpg", intro: "赛文奥特曼是奥特兄弟中的老三，也是赛罗的爸爸！头上有特殊的头镖。绝招是艾梅利姆光线！" },
                { name: "杰克奥特曼", color: "红银色", emoji: "🛡️", image: "杰克.jpg", intro: "杰克奥特曼是奥特兄弟中的老四！手上有奥特手镯，可以变出各种武器。" },
                { name: "艾斯奥特曼", color: "红银色", emoji: "✂️", image: "艾斯.jpg", intro: "艾斯奥特曼是奥特兄弟中的老五！头上有两个像兔子耳朵一样的角。绝招是梅塔利姆光线！" },
                { name: "泰罗奥特曼", color: "红银色", emoji: "👑", image: "泰罗.jpg", intro: "泰罗奥特曼是奥特之父和奥特之母的儿子，泰迦的爸爸！绝招是斯特利姆光线！" },
                { name: "雷欧奥特曼", color: "红黑金", emoji: "🥊", image: "雷欧.jpg", intro: "雷欧奥特曼来自狮子座L77星云，是格斗之王！绝招是雷欧飞踢！" },
                { name: "爱迪奥特曼", color: "红银色", emoji: "📚", image: "爱迪.jpg", intro: "爱迪奥特曼是昭和系最后一位奥特曼，也是全能王！" }
            ],
            heisei: [
                { name: "迪迦奥特曼", color: "红紫银", emoji: "✨", image: "迪迦.jpg", intro: "迪迦奥特曼是三千万年前的超古代战士！有力量型、空中型、复合型三种形态。绝招是哉佩利敖光线！" },
                { name: "戴拿奥特曼", color: "蓝红银", emoji: "🚀", image: "戴拿.jpg", intro: "戴拿奥特曼是宇宙之光！有闪亮型、强壮型、奇迹型三种形态。和迪迦、盖亚并称平成三杰！" },
                { name: "盖亚奥特曼", color: "红黑银", emoji: "🌍", image: "盖亚.jpg", intro: "盖亚奥特曼代表大地之力！绝招是光子冰刀！代表大地的愤怒！" },
                { name: "阿古茹奥特曼", color: "蓝黑银", emoji: "🌊", image: "阿古茹.jpg", intro: "阿古茹奥特曼代表海洋之力，是盖亚的搭档！绝招是光子粉碎机！" },
                { name: "高斯奥特曼", color: "蓝银色", emoji: "🌙", image: "高斯.jpg", intro: "高斯奥特曼是仁慈的战士，代表月亮的力量！绝招是满月光波！" },
                { name: "奈克瑟斯奥特曼", color: "红黑银", emoji: "⚡", image: "奈克瑟斯.jpg", intro: "奈克瑟斯是诺亚奥特曼的幼年形态！胸口有Y形的能量核心。" },
                { name: "麦克斯奥特曼", color: "红银色", emoji: "🔱", image: "麦克斯.jpg", intro: "麦克斯奥特曼是超级快、超级强的奥特曼！有900米巨大形态！" },
                { name: "梦比优斯奥特曼", color: "红银色", emoji: "🔥", image: "梦比优斯.jpg", intro: "梦比优斯是奥特兄弟中的老幺！可以变身成无限形态，集合奥特六兄弟的力量！" }
            ],
            newgen: [
                { name: "赛罗奥特曼", color: "红蓝银", emoji: "⚔️", image: "赛罗.jpg", intro: "赛罗奥特曼是赛文的儿子，新生代最强战士！头上有两把冰斧头镖。绝招是赛罗集束射线！" },
                { name: "银河奥特曼", color: "红银水晶", emoji: "💎", image: "银河.jpg", intro: "银河奥特曼来自未来，身上有闪闪发光的水晶！开启了借力量的时代！" },
                { name: "维克特利奥特曼", color: "黄黑银", emoji: "🃏", image: "维克特利.jpg", intro: "维克特利来自地底世界！身体有V字图案，可以把怪兽的力量变成武器！" },
                { name: "艾克斯奥特曼", color: "红银色", emoji: "📱", image: "艾克斯.jpg", intro: "艾克斯是数码奥特曼，可以穿上各种装甲！X形头镖超帅！" },
                { name: "欧布奥特曼", color: "红黑银", emoji: "🌀", image: "欧布.jpg", intro: "欧布奥特曼是浪客英雄！可以借两位前辈的力量合体，形态最多最帅！" },
                { name: "捷德奥特曼", color: "红黑银", emoji: "👊", image: "捷德.jpg", intro: "捷德奥特曼是贝利亚的儿子，但他是正义的英雄！只要心向光明就是英雄！" },
                { name: "罗索奥特曼", color: "红银色", emoji: "🔥", image: "罗索.jpg", intro: "罗索是布鲁的哥哥，代表火焰！有四种形态可以变身！" },
                { name: "布鲁奥特曼", color: "蓝银色", emoji: "💧", image: "布鲁.jpg", intro: "布鲁是罗索的弟弟，代表水流！三兄妹合体可以成为格罗布奥特曼！" },
                { name: "格丽乔奥特曼", color: "橙银色", emoji: "🌈", image: "格丽乔.jpg", intro: "格丽乔是罗索和布鲁的妹妹！新生代第一位女性奥特曼，可爱又勇敢！" },
                { name: "泰迦奥特曼", color: "红金银", emoji: "⚡", image: "泰迦.jpg", intro: "泰迦是泰罗的儿子！光子大地形态全身金色超帅！" },
                { name: "泰塔斯奥特曼", color: "红黑银", emoji: "💪", image: "泰塔斯.jpg", intro: "泰塔斯来自U40星球，肌肉超发达的力量型战士！" },
                { name: "风马奥特曼", color: "绿蓝银", emoji: "💨", image: "风马.jpg", intro: "风马像忍者一样速度超快！和泰迦、泰塔斯组成三人小队！" }
            ],
            reiwa: [
                { name: "泽塔奥特曼", color: "红蓝银", emoji: "💫", image: "泽塔.jpg", intro: "泽塔是赛罗的徒弟，超级努力！可以借三位前辈的力量变身。绝招是泽斯帝姆光线！" },
                { name: "特利迦奥特曼", color: "红紫金", emoji: "🌟", image: "特利迦.jpg", intro: "特利迦是令和迪迦，新时代的战士！继承了迪迦的精神！" },
                { name: "德凯奥特曼", color: "蓝红银", emoji: "🌌", image: "德凯.jpg", intro: "德凯是令和戴拿，来自未来的战士！和特利迦一起守护地球！" },
                { name: "布莱泽奥特曼", color: "红黑银", emoji: "🪐", image: "布莱泽.jpg", intro: "布莱泽来自M421星球，是野性的光之巨人！会发出独特的战吼声！" },
                { name: "亚刻奥特曼", color: "红金银", emoji: "☀️", image: "亚刻.jpg", intro: "亚刻是最新的奥特曼！可以用想象力创造光之武器！" }
            ],
            special: [
                { name: "赛迦奥特曼", color: "紫蓝银", emoji: "👑", image: "赛迦.jpg", intro: "赛迦是传说中的战士，由赛罗、戴拿、高斯合体诞生！宇宙最强战士之一！" },
                { name: "雷杰多奥特曼", color: "红紫银", emoji: "🌌", image: "雷杰多.jpg", intro: "雷杰多是大宇宙的意志！拥有宇宙最强的力量，可以重置宇宙！" },
                { name: "诺亚奥特曼", color: "红银金", emoji: "👼", image: "诺亚.jpg", intro: "诺亚是宇宙第一道光，最古老的奥特曼！神秘四奥之首，最强！" },
                { name: "奥特之王", color: "红金银", emoji: "🤴", image: "奥特之王.jpg", intro: "奥特之王是光之国的王者！地位最高最尊贵，所有奥特曼的偶像！" }
            ]
        };

        // 分类介绍
        var categoryIntros = {
            showa: "昭和系奥特曼是1966年到1989年登场的经典老奥特曼，包括初代、赛文、杰克、艾斯、泰罗、雷欧、爱迪七位奥特兄弟。",
            heisei: "平成系奥特曼是1990年到2013年登场的奥特曼，以迪迦、戴拿、盖亚平成三杰最为著名。",
            newgen: "新生代奥特曼是2013年之后登场的奥特曼，可以借用前辈的力量变身，赛罗、欧布、捷德都是这一代的明星！",
            reiwa: "令和系奥特曼是2019年之后登场的最新奥特曼，包括泽塔、特利迦、德凯、布莱泽、亚刻。",
            special: "特殊奥特曼是传说中的超级战士，包括赛迦、雷杰多、诺亚和奥特之王，拥有宇宙最强的力量！"
        };

        // 当前播放状态
        var currentBtn = null;
        var isSpeaking = false;

        // 获取图片路径
        function getImagePath(filename) {
            return 'ultraman_images/' + filename;
        }

        // 渲染奥特曼卡片
        function renderUltramen(category, containerId) {
            var container = document.getElementById(containerId);
            var data = ultramanData[category];
            
            for (var i = 0; i < data.length; i++) {
                var ultraman = data[i];
                var card = document.createElement('div');
                card.className = 'ultraman-card ' + category;
                
                var shortName = ultraman.name.replace('奥特曼', '');
                var imagePath = getImagePath(ultraman.image);
                
                card.innerHTML = '<div class="image-container">' +
                    '<img class="ultraman-image" src="' + imagePath + '" alt="' + ultraman.name + '" ' +
                    'onerror="this.style.display=\'none\'; this.parentElement.innerHTML=\'<div class=placeholder-img>' + ultraman.emoji + '<div class=placeholder-text>' + shortName + '</div></div>\';" />' +
                    '</div>' +
                    '<h2 class="ultraman-name">' + ultraman.name + '</h2>' +
                    '<div class="color-tag">' + ultraman.color + '</div>' +
                    '<button class="play-btn" onclick="playIntro(\'' + category + '\', ' + i + ', this)">播放介绍</button>';
                
                container.appendChild(card);
            }
        }

        // 播放语音
        function speak(text, btn) {
            // 停止之前的语音
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            
            if (!window.speechSynthesis) {
                alert('您的浏览器不支持语音播放，请使用 Chrome 或 Safari 浏览器');
                return;
            }
            
            var speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'zh-CN';
            speech.rate = 0.9;
            speech.pitch = 1;
            speech.volume = 1;
            
            if (btn) {
                speech.onstart = function() {
                    btn.classList.add('playing');
                    btn.innerHTML = '播放中...';
                    isSpeaking = true;
                    currentBtn = btn;
                };
                
                speech.onend = function() {
                    btn.classList.remove('playing');
                    btn.innerHTML = '播放介绍';
                    isSpeaking = false;
                    currentBtn = null;
                };
                
                speech.onerror = function() {
                    btn.classList.remove('playing');
                    btn.innerHTML = '播放介绍';
                    isSpeaking = false;
                    currentBtn = null;
                };
            }
            
            window.speechSynthesis.speak(speech);
        }

        // 播放分类介绍
        function playCategory(category, element) {
            // 如果正在播放，停止
            if (currentBtn === element && isSpeaking) {
                window.speechSynthesis.cancel();
                element.innerHTML = element.innerHTML.replace('🔊 ', '');
                isSpeaking = false;
                currentBtn = null;
                return;
            }
            
            // 停止之前的
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            if (currentBtn) {
                currentBtn.classList.remove('playing');
                if (currentBtn.tagName === 'BUTTON') {
                    currentBtn.innerHTML = '播放介绍';
                } else {
                    currentBtn.innerHTML = currentBtn.innerHTML.replace('🔊 ', '');
                }
            }
            
            // 播放新的
            currentBtn = element;
            element.innerHTML = '🔊 ' + element.innerHTML;
            speak(categoryIntros[category], element);
        }

        // 播放单个奥特曼介绍
        function playIntro(category, index, btn) {
            // 如果正在播放，停止
            if (currentBtn === btn && isSpeaking) {
                window.speechSynthesis.cancel();
                btn.classList.remove('playing');
                btn.innerHTML = '播放介绍';
                isSpeaking = false;
                currentBtn = null;
                return;
            }
            
            // 停止之前的
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            if (currentBtn) {
                currentBtn.classList.remove('playing');
                if (currentBtn.tagName === 'BUTTON') {
                    currentBtn.innerHTML = '播放介绍';
                } else {
                    currentBtn.innerHTML = currentBtn.innerHTML.replace('🔊 ', '');
                }
            }
            
            // 播放新的
            var ultraman = ultramanData[category][index];
            speak(ultraman.intro, btn);
        }

        // 页面加载完成后渲染
        window.onload = function() {
            renderUltramen('showa', 'showaGrid');
            renderUltramen('heisei', 'heiseiGrid');
            renderUltramen('newgen', 'newgenGrid');
            renderUltramen('reiwa', 'reiwaGrid');
            renderUltramen('special', 'specialGrid');
        };
    </script>
</body>
</html>
