<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 奥特曼大集合 🌟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 48px;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }

        .header p {
            font-size: 24px;
            color: #fff;
            margin-top: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .category-section {
            margin-bottom: 40px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 40px 0 20px;
        }

        .category-title {
            font-size: 32px;
            color: #fff;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .category-title:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .category-play-btn {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
            transition: all 0.3s;
        }

        .category-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.6);
        }

        .category-play-btn.playing {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .ultraman-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .ultraman-card {
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 5px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .ultraman-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .image-container {
            width: 220px;
            height: 300px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1), 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
        }

        .ultraman-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }

        .ultraman-card:hover .ultraman-image {
            transform: scale(1.05);
        }

        .placeholder-img {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .placeholder-text {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
        }

        .ultraman-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .color-tag {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
            padding: 5px 12px;
            background: linear-gradient(90deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            display: inline-block;
        }

        .play-btn {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
            font-family: inherit;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(245, 87, 108, 0.6);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            animation: pulse-card 1s infinite;
        }

        @keyframes pulse-card {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .play-icon {
            font-size: 28px;
        }

        /* 各系配色 */
        .showa .image-container { background: linear-gradient(135deg, #ff6b6b, #ee5a52); }
        .showa .ultraman-name { color: #c0392b; }
        .showa { border-top: 8px solid #e74c3c; }

        .heisei .image-container { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .heisei .ultraman-name { color: #2980b9; }
        .heisei { border-top: 8px solid #3498db; }

        .newgen .image-container { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .newgen .ultraman-name { color: #8e44ad; }
        .newgen { border-top: 8px solid #9b59b6; }

        .reiwa .image-container { background: linear-gradient(135deg, #fdcb6e, #e17055); }
        .reiwa .ultraman-name { color: #e67e22; }
        .reiwa { border-top: 8px solid #f39c12; }

        .special .image-container { background: linear-gradient(135deg, #55efc4, #00b894); }
        .special .ultraman-name { color: #16a085; }
        .special { border-top: 8px solid #1abc9c; }

        .star {
            position: fixed;
            font-size: 30px;
            animation: twinkle 2s infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 28px; }
            .header p { font-size: 16px; }
            .category-title { font-size: 24px; padding: 12px 20px; }
            .category-play-btn { width: 40px; height: 40px; font-size: 20px; }
            .ultraman-name { font-size: 24px; }
            .play-btn { font-size: 20px; padding: 12px 25px; }
            .image-container { width: 180px; height: 240px; }
        }
    </style>
</head>
<body>
    <div class="star" style="top: 10%; left: 5%;">⭐</div>
    <div class="star" style="top: 20%; right: 10%;">✨</div>
    <div class="star" style="top: 60%; left: 3%;">🌟</div>
    <div class="star" style="top: 80%; right: 5%;">⭐</div>
    <div class="star" style="top: 40%; left: 8%;">✨</div>
    <div class="star" style="top: 70%; right: 12%;">🌟</div>

    <div class="header">
        <h1>🌟 奥特曼大集合 🌟</h1>
        <p>👇 点击播放按钮，听听奥特曼的故事吧！ 👇</p>
    </div>

    <div class="container">
        <!-- 昭和系 -->
        <div class="category-section">
            <div class="category-header">
                <h2 class="category-title" onclick="playCategoryIntro('showa')">🔴 昭和系奥特曼（经典老奥特曼）</h2>

            <div class="ultraman-grid" id="heiseiGrid"></div>

        <!-- 令和系 -->
        <div class="category-section">
            <div class="category-header">

                <button class="category-play-btn" onclick="playCategoryIntro('reiwa', this)" title="点击听介绍">▶️</button>

        </div>

    <script>
        // 分类介绍文字
        const categoryIntros = {
            showa: "昭和系奥特曼是1966年到1989年登场的经典老奥特曼，包括初代、赛文、杰克、艾斯、泰罗、雷欧、爱迪七位奥特兄弟。他们是奥特曼系列的开山祖师，是很多爸爸妈妈童年的回忆！",
            heisei: "平成系奥特曼是1990年到2013年登场的奥特曼，以迪迦、戴拿、盖亚平成三杰最为著名。这一时期的奥特曼开始拥有变换形态的能力，故事也更加丰富多彩！",
            newgen: "新生代奥特曼是2013年之后登场的奥特曼，从银河奥特曼开始。这一代的奥特曼可以借用前辈的力量变身，拥有超级多帅气的形态，赛罗、欧布、捷德都是这一代的明星！",
            reiwa: "令和系奥特曼是2019年之后登场的最新奥特曼，包括泽塔、特利迦、德凯、布莱泽、亚刻。他们继承了前辈的精神，同时使用最新的特效技术，超级帅气！",
            special: "特殊奥特曼是传说中的超级战士，包括赛迦、雷杰多、诺亚和奥特之王。他们拥有宇宙最强的力量，只在最危急的时刻出现，是奥特曼中的奥特曼！"
        };

        // 奥特曼数据
        const ultramanData = {
            showa: [
                { name: "初代奥特曼", color: "🔴⚪ 红银色", emoji: "🦸‍♂️", imageNames: ["初代.jpg", "初代奥特曼.jpg"], intro: "初代奥特曼是第一个来到地球的奥特曼！他来自M78星云的光之国，是宇宙警备队的队员。他的身体主要是红色和银色，胸前有蓝色的能量灯。初代奥特曼的绝招是斯派修姆光线，双手十字交叉发射出强大的光束！他是所有奥特曼的鼻祖，1966年就登场了，是奥特曼系列的开山祖师！" },
                { name: "赛文奥特曼", color: "🔴⚪ 红银色", emoji: "👁️", imageNames: ["赛文.jpg", "赛文奥特曼.jpg"], intro: "赛文奥特曼是奥特兄弟中的老三，也是赛罗奥特曼的爸爸！他头上有特殊的头镖，可以拿下来当飞镖使用。赛文的胸口没有灯，而是有铠甲一样的护甲。他的绝招是艾梅利姆光线，从额头的小灯发射出来！赛文非常聪明，是战术大师，经常帮助其他奥特曼解决难题！" },
                { name: "杰克奥特曼", color: "🔴⚪ 红银色", emoji: "🛡️", imageNames: ["杰克.jpg", "杰克奥特曼.jpg"], intro: "杰克奥特曼是奥特兄弟中的老四！他的外表和初代很像，但是手上多了一条奥特手镯，可以变出各种武器。杰克的绝招是斯派修姆光线，还有希奈拉玛射线！他虽然没有变身器，但是可以靠意念变身。杰克奥特曼教会了我们坚持和勇气的重要性！" },
                { name: "艾斯奥特曼", color: "🔴⚪ 红银色", emoji: "✂️", imageNames: ["艾斯.jpg", "艾斯奥特曼.jpg"], intro: "艾斯奥特曼是奥特兄弟中的老五，是擅长使用各种光线技能的战士！他头上有两个像兔子耳朵一样的角。艾斯的绝招是梅塔利姆光线，还有垂直断头刀，可以切割怪兽！他经常和奥特兄弟一起战斗，是光线技能的大师，有奥特断头台等强力技能！" },
                { name: "泰罗奥特曼", color: "🔴⚪ 红银色", emoji: "👑", imageNames: ["泰罗.jpg", "泰罗奥特曼.jpg"], intro: "泰罗奥特曼是奥特之父和奥特之母的亲生儿子，也是泰迦奥特曼的爸爸！他是奥特六兄弟中的老六，最小也最被宠爱。泰罗的绝招是斯特利姆光线，还有奥特炸弹，全身着火冲向敌人！泰罗后来成为了宇宙警备队的教官，教导新一代的奥特曼战士！" },
                { name: "雷欧奥特曼", color: "🔴⚫ 红黑金", emoji: "🥊", imageNames: ["雷欧.jpg", "雷欧奥特曼.jpg"], intro: "雷欧奥特曼来自狮子座L77星云，是格斗之王！他的身体是红色，有黑色的条纹，眼睛和其他奥特曼不一样。雷欧不擅长光线技能，但是体术超强，是空手道高手！他的绝招是雷欧飞踢，一脚就能踢爆怪兽！雷欧后来成为了赛罗的师父，教会了赛罗格斗技巧！" },
                { name: "爱迪奥特曼", color: "🔴⚪ 红银色", emoji: "📚", imageNames: ["爱迪.jpg", "爱迪奥特曼.jpg"], intro: "爱迪奥特曼是昭和系最后一位奥特曼，也是全能王！他的身体有红色和银色的条纹，头上有小小的角。爱迪的绝招是沙库修姆光线，还有蒙萨尔特飞踢！爱迪是全能型的战士，体术和光线都很强。他教会了我们要相信自己，永不放弃！" }

                { name: "阿古茹奥特曼", color: "🔵⚫ 蓝黑银", emoji: "🌊", imageNames: ["阿古茹.jpg", "阿古茹奥特曼.jpg"], intro: "阿古茹奥特曼代表海洋之力，是盖亚的搭档！他的身体是蓝色和黑色，看起来很高冷。阿古茹一开始有点反派的感觉，但后来成为了正义的战士。他的绝招是光子粉碎机，从头部发射光束！阿古茹代表海洋的神秘，和盖亚一起守护地球！" },
                { name: "高斯奥特曼", color: "🔵⚪ 蓝银色", emoji: "🌙", imageNames: ["高斯.jpg", "高斯奥特曼.jpg"], intro: "高斯奥特曼是仁慈的战士，代表月亮的力量！他的身体是温柔的蓝色和银色。高斯有两种形态：月神形态很温柔，可以净化怪兽；日冕形态很强大，可以战斗。他的绝招是满月光波，可以安抚怪兽！高斯相信怪兽也可以变得善良，是充满爱心的奥特曼！" },

                { name: "梦比优斯奥特曼", color: "🔴⚪ 红银色", emoji: "🔥", imageNames: ["梦比优斯.jpg", "梦比优斯奥特曼.jpg"], intro: "梦比优斯奥特曼是奥特兄弟中的老幺，是宇宙警备队的新人！他的身体有红色火焰的条纹。梦比优斯可以和人类伙伴一起变身成无限形态，集合奥特六兄弟的力量！他的绝招是梦比姆射线，还有无限形态的梦比姆骑士射线！梦比优斯象征着无限的可能性！" }

        // 尝试加载本地图片
        function tryLoadImage(imageNames) {
            for (let name of imageNames) {
                const path = `ultraman_images/${name}`;
                return path;
            }
            return null;
        }

        // 渲染奥特曼卡片
        function renderUltramen(category, containerId) {
            const container = document.getElementById(containerId);
            const data = ultramanData[category];
            
            data.forEach((ultraman, index) => {
                const card = document.createElement('div');
                card.className = `ultraman-card ${category}`;
                
                const imagePath = tryLoadImage(ultraman.imageNames);
                const shortName = ultraman.name.replace('奥特曼', '');
                
                // 添加时间戳防止缓存
                const timestamp = new Date().getTime();
                const imageSrc = imagePath + '?t=' + timestamp;
                
                card.innerHTML = `
                    <div class="image-container">
                        <img class="ultraman-image" 
                             src="${imageSrc}" 
                             alt="${ultraman.name}"
                             onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'placeholder-img\'>${ultraman.emoji}<div class=\'placeholder-text\'>${shortName}</div></div>';">
                    </div>
                    <h2 class="ultraman-name">${ultraman.name}</h2>
                    <div class="color-tag">${ultraman.color}</div>
                    <button class="play-btn" onclick="playIntro('${category}', ${index}, this)">
                        <span class="play-icon">▶️</span>
                        <span>播放介绍</span>
                    </button>
                `;
                container.appendChild(card);
            });
        }

        // 语音合成
        let currentSpeech = null;
        let currentBtn = null;
        let categorySpeech = null;
        let categoryBtn = null;
        let voices = [];

        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        // 当前正在播放的分类
        let currentCategory = null;
        let categoryBtns = {};

        // 播放分类介绍
        function playCategoryIntro(category, btn = null) {
            // 如果点击的是当前正在播放的分类，停止播放
            if (currentCategory === category) {
                window.speechSynthesis.cancel();
                if (categoryBtns[category]) {
                    categoryBtns[category].classList.remove('playing');
                    categoryBtns[category].textContent = '▶️';
                }
                currentCategory = null;
                return;
            }

            // 停止其他语音
            if (currentSpeech) {
                window.speechSynthesis.cancel();
                if (currentBtn) {
                    currentBtn.classList.remove('playing');
                    currentBtn.querySelector('span:last-child').textContent = '播放介绍';
                    currentBtn.querySelector('.play-icon').textContent = '▶️';
                    currentBtn = null;
                    currentSpeech = null;
                }
            }
            
            // 停止其他分类的语音
            if (currentCategory) {
                window.speechSynthesis.cancel();
                if (categoryBtns[currentCategory]) {
                    categoryBtns[currentCategory].classList.remove('playing');
                    categoryBtns[currentCategory].textContent = '▶️';
                }
            }

            // 播放新的分类介绍
            currentCategory = category;
            const intro = categoryIntros[category];
            const speech = new SpeechSynthesisUtterance(intro);
            speech.lang = 'zh-CN';
            speech.rate = 0.8;
            speech.pitch = 1.0;
            speech.volume = 1;

            const preferredVoices = ['Microsoft Xiaoxiao', 'Microsoft Yaoyao', 'Ting-Ting', 'Mei-Jia'];
            for (let voiceName of preferredVoices) {
                const voice = voices.find(v => v.name.includes(voiceName));
                if (voice) {
                    speech.voice = voice;
                    break;
                }
            }

            // 获取或保存按钮引用
            if (btn) {
                categoryBtns[category] = btn;
            }
            
            const targetBtn = categoryBtns[category];
            if (targetBtn) {
                speech.onstart = () => {
                    targetBtn.classList.add('playing');
                    targetBtn.textContent = '🔊';
                };

                speech.onend = () => {
                    targetBtn.classList.remove('playing');
                    targetBtn.textContent = '▶️';
                    if (currentCategory === category) {
                        currentCategory = null;
                    }
                };
            }

            window.speechSynthesis.speak(speech);
        }

        // 播放单个奥特曼介绍
        function playIntro(category, index, btn) {
            // 停止分类语音
            if (currentCategory) {
                window.speechSynthesis.cancel();
                if (categoryBtns[currentCategory]) {
                    categoryBtns[currentCategory].classList.remove('playing');
                    categoryBtns[currentCategory].textContent = '▶️';
                }
                currentCategory = null;
            }

            // 停止之前的语音
            if (currentSpeech) {
                window.speechSynthesis.cancel();
                if (currentBtn && currentBtn !== btn) {
                    currentBtn.classList.remove('playing');
                    currentBtn.querySelector('span:last-child').textContent = '播放介绍';
                    currentBtn.querySelector('.play-icon').textContent = '▶️';
                }
            }

            // 如果点击的是同一个按钮且正在播放，只停止不播放
            if (currentBtn === btn && btn.classList.contains('playing')) {
                btn.classList.remove('playing');
                btn.querySelector('span:last-child').textContent = '播放介绍';
                btn.querySelector('.play-icon').textContent = '▶️';
                currentBtn = null;
                currentSpeech = null;
                return;
            }

            // 播放新语音
            const ultraman = ultramanData[category][index];
            const speech = new SpeechSynthesisUtterance(ultraman.intro);
            speech.lang = 'zh-CN';
            speech.rate = 0.8;
            speech.pitch = 1.0;
            speech.volume = 1;

            const preferredVoices = ['Microsoft Xiaoxiao', 'Microsoft Yaoyao', 'Ting-Ting', 'Mei-Jia'];
            for (let voiceName of preferredVoices) {
                const voice = voices.find(v => v.name.includes(voiceName));
                if (voice) {
                    speech.voice = voice;
                    break;
                }
            }

            speech.onstart = () => {
                btn.classList.add('playing');
                btn.querySelector('span:last-child').textContent = '播放中...';
                btn.querySelector('.play-icon').textContent = '🔊';
            };

            speech.onend = () => {
                btn.classList.remove('playing');
                btn.querySelector('span:last-child').textContent = '播放介绍';
                btn.querySelector('.play-icon').textContent = '▶️';
                if (currentBtn === btn) {
                    currentBtn = null;
                    currentSpeech = null;
                }
            };

            currentSpeech = speech;
            currentBtn = btn;
            window.speechSynthesis.speak(speech);
        }

        window.onload = () => {
            renderUltramen('showa', 'showaGrid');
            renderUltramen('heisei', 'heiseiGrid');
            renderUltramen('newgen', 'newgenGrid');
            renderUltramen('reiwa', 'reiwaGrid');
            renderUltramen('special', 'specialGrid');
            setTimeout(loadVoices, 100);
        };
    </script>
